{% extends 'base.html' %}
{% block content %}

{% load static %}

<section class="section-content padding-y bg">
<div class="container">

<!-- ============================ COMPONENT 1 ================================= -->

	<div class="row">
	<aside class="col-lg-6">
<div class="card">
    <div class="card shadow-sm">
  <div class="card-body">
    <h4 class="card-title mb-4">Billing Address</h4>

    <form action="#" method="POST">
      <div class="row g-3">

        {% csrf_token %}

        <!-- First Name -->
        <div class="col-md-4">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="John" required>
        </div>

        <!-- Email -->
        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <!-- Phone -->
        <div class="col-md-4">
          <label class="form-label">Phone Number</label>
          <input type="tel" name="phone" class="form-control" placeholder="+91 9876543210" required>
        </div>

        <!-- Address Line 1 -->
        <div class="col-12">
          <label class="form-label">Address Line 1</label>
          <input type="text" name="address_line1" class="form-control" placeholder="Street address" required>
        </div>

        <!-- Address Line 2 -->
        <div class="col-12">
          <label class="form-label">Address Line 2</label>
          <input type="text" name="address_line2" class="form-control" placeholder="Apartment, suite, etc (optional)">
        </div>

        <!-- City -->
        <div class="col-md-4">
          <label class="form-label">City</label>
          <input type="text" name="city" class="form-control" required>
        </div>

        <!-- State -->
        <div class="col-md-4">
          <label class="form-label">State</label>
          <input type="text" name="state" class="form-control" required>
        </div>

        <!-- Country -->
        <div class="col-md-4">
          <label class="form-label">Country</label>
          <input type="text" name="country" class="form-control" value="India" required>
        </div>

        <!-- Order Note -->
        <div class="col-12">
          <label class="form-label">Order Note</label>
          <textarea name="order_note" rows="3" class="form-control" placeholder="Optional notes..."></textarea>
        </div>
            

      </div>
    
  </div>
</div>

</div> <!-- card.// -->

	</aside> <!-- col.// -->
	<aside class="col-lg-6">

		<div class="card">
		<div class="card-body">
			<table class="table table-borderless table-shopping-cart">
<thead class="text-muted">
<tr class="small text-uppercase">
  <th scope="col">Product</th>
  <th scope="col" width="120">Quantity</th>
  <th scope="col" width="120">Price</th>
  <th scope="col" class="text-right" width="200"> </th>
</tr>
</thead>
<tbody>
{% for cart_item in cart_items %}
<tr>
	<td>
		<figure class="itemside align-items-center">
			<div class="aside"><img src="{{ cart_item.product.image.url }}" class="img-sm"></div>
			<figcaption class="info">
				<a href="{{ cart_item.product.get_url }}" class="title text-dark">{{ cart_item.product.product_name }}</a>
				<p class="text-muted small">
					{% if cart_item.variation.all %}
    					{% for i in cart_item.variation.all %}
							{{ i.variation_name | capfirst }} : {{ i.variation_value | capfirst }}<br>
						{% endfor %}
					{% endif %}
				</p>
			</figcaption>
		</figure>
	</td>

	<td>
		<!-- col.// -->
					<div class="col">
						<div class="input-group input-spinner">
							
							<input type="text" class="form-control"  value="{{ cart_item.quantity }}">
							
						</div> <!-- input-group.// -->
					</div> <!-- col.// -->
	</td>
	<td>
		<div class="price-wrap">
			<var class="price">${{ cart_item.subtotal }}</var>
			<small class="text-muted"> ${{cart_item.product.price}} each </small>
		</div> <!-- price-wrap .// -->
	</td>
	
</tr>
{% endfor %}
</tbody>
</table>


            <button type="submit" name="submit" class="btn btn-primary btn-block">Place Order</button>
			<a href="{% url 'home' %}" class="btn btn-light btn-block">Continue Shopping</a>

            </form>
		</div> <!-- card-body.// -->
		</div> <!-- card.// -->

</aside> <!-- col.// -->


</div> <!-- row.// -->
<!-- ============================ COMPONENT 1 END .// ================================= -->

</div> <!-- container .//  -->
</section>
<!-- ========================= SECTION CONTENT END// ========================= -->


{% endblock %}
