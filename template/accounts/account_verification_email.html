<!-- 
{% autoescape off %}
    Please click on below link to confirm your registration

    http://{{domain}}{% url 'activate' uidb64=uid token=token %}
    

    if You are not register in GREAT-KART online shoppong platform then please ignore it 
{% endautoescape %} -->


<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Activate Your GreatKart Account</title>
</head>
<body style="font-family: Arial, sans-serif; background-color:#f4f4f4; padding:20px;">

    <div style="max-width:600px; margin:auto; background:#ffffff; border-radius:8px; padding:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">

        <!-- Header -->
        <h2 style="color:#2c3e50; text-align:center;">Welcome to <span style="color:#e67e22;">GreatKart</span>!</h2>

        <!-- Greeting -->
        <p style="font-size:16px; color:#333;">
            Hi {{ user.first_name }},
        </p>

        <!-- Message -->
        <p style="font-size:16px; color:#333;">
            Thank you for registering with <strong>GreatKart</strong>. Please confirm your email address by clicking the button below:
        </p>

        <!-- Activation Button -->
        <div style="text-align:center; margin:30px 0;">
            <a href="http://{{ domain }}{% url 'activate' uidb64=uid token=token %}"
               style="background:#e67e22; color:#fff; padding:12px 25px; text-decoration:none; border-radius:5px; font-size:16px;">
               Activate My Account
            </a>
        </div>

        <!-- Footer -->
        <p style="font-size:14px; color:#777;">
            If you did not register for GreatKart, please ignore this email.
        </p>
        <p style="font-size:14px; color:#777; text-align:center;">
            &copy; {{ now|date:"Y" }} GreatKart Online Shopping Platform
        </p>

    </div>
</body>
</html>
